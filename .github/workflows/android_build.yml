name: Build APK with Buildozer

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # 允许在 Actions 页面手动点击触发打包

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4  # 升级至最新的 v4 稳定版

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            python3-setuptools \
            openjdk-11-jdk \
            git \
            zip \
            unzip \
            libssl-dev \
            libffi-dev \
            build-essential \
            libsqlite3-dev \
            wget \
            curl \
            cmake \
            autoconf \
            automake \
            libtool \
            pkg-config

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install --upgrade buildozer cython virtualenv

      - name: Fix directory issue (Ensure p4a exists before clean)
        run: |
          mkdir -p .buildozer/android/platform/python-for-android

      - name: Clean Buildozer environment
        run: buildozer android clean

      - name: Update Android platform and dependencies
        run: buildozer -v android update

      - name: Build APK debug
        run: buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4  # 升级至最新的 v4，彻底解决破坏性废弃报错
        with:
          name: app-debug-apk
          path: bin/*.apk
