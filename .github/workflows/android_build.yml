name: Build APK

on:
  push:
    branches:
      - main  # 主分支名称，必要时修改成 master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python 3.8
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip python3-setuptools python3-wheel python3-virtualenv \
          git openjdk-11-jdk zip unzip \
          build-essential libncurses-dev libffi-dev libssl-dev libsqlite3-dev
        pip install --upgrade pip
        pip install buildozer cython

    - name: Clean and build APK
      run: |
        buildozer android clean
        buildozer android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: myapp-debug-apk
        path: bin/*.apk
