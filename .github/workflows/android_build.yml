name: Build APK with Buildozer

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_API: 33
      ANDROID_MIN_API: 21
      ANDROID_NDK: 25b
      ANDROID_BUILD_TOOLS: 33.0.2

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            python3-setuptools \
            openjdk-11-jdk \
            git \
            zip \
            unzip \
            libssl-dev \
            libffi-dev \
            build-essential \
            libsqlite3-dev \
            wget \
            curl

      - name: Install Cython (matching buildozer requirements)
        run: pip3 install cython

      - name: Install Buildozer and dependencies
        run: pip3 install --upgrade buildozer

      - name: Build APK - Clean first
        run: buildozer android clean

      - name: Update android platforms and dependencies
        run: buildozer android update

      - name: Build APK - Debug
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-debug-apk
          path: bin/*.apk
