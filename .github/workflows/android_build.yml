name: Build APK

on:
  push:
    branches:
      - main  # 你的主分支名字，如果是master，请改成master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    - name: Install buildozer and dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip python3-setuptools python3-wheel python3-virtualenv git openjdk-17-jdk zip unzip
        pip install --upgrade pip
        pip install buildozer cython

    - name: Initialize Buildozer Android environment
      run: |
        buildozer android clean
        buildozer android debug

    - name: Archive APK
      uses: actions/upload-artifact@v4
      with:
        name: myapp-debug-apk
        path: bin/*.apk
